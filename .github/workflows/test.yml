name: test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Build native extension
        run: make build_ext

      - name: Run unit tests
        run: make test

      - name: Run examples
        run: make examples
